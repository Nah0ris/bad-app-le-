{% extends 'base.html' %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card shadow-sm">
        <div class="card-header bg-light">
          <h2 class="mb-0">Report a Lost Item</h2>
        </div>
        <div class="card-body">
          <form action="{{ url_for('report_item') }}" method="post">
            <div class="mb-3">
              <label for="student_name" class="form-label">Your Name</label>
              <input type="text" class="form-control" id="student_name" name="student_name" placeholder="Optional" />
            </div>
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input type="email" class="form-control" id="email" name="email" required placeholder="you@college.edu" />
            </div>
            <div class="mb-3">
              <label for="description" class="form-label">Description of Lost Item</label>
              <textarea class="form-control" id="description" name="description" rows="4" required placeholder="Describe the item and any identifying details"></textarea>
            </div>
            <div class="mb-3">
              <label for="location" class="form-label">Last Known Location</label>
              <input type="text" class="form-control" id="location" name="location" placeholder="e.g. Library, Gym, Cafeteria" />
            </div>
            <button type="submit" class="btn btn-primary">Submit Report</button>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
